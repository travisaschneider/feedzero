<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>FeedZero</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        width: 280px;
        background: Canvas;
        color: CanvasText;
      }
      h1 {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 8px;
      }
      p {
        font-size: 12px;
        line-height: 1.4;
        margin: 0 0 8px;
        color: GrayText;
      }
      a {
        color: LinkText;
        font-size: 12px;
      }
      .status {
        display: inline-block;
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: rgba(0, 128, 0, 0.15);
        color: green;
      }
    </style>
  </head>
  <body>
    <h1>FeedZero <span class="status">connected</span></h1>
    <p>
      Open FeedZero in any tab to read your paid subscriptions. The extension
      authorizes each publisher individually — credentials never leave your
      browser.
    </p>
    <p>
      <a href="https://my.feedzero.app/settings" target="_blank" rel="noopener"
        >Open FeedZero settings</a
      >
    </p>
  </body>
</html>
