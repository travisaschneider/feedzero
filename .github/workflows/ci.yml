name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

  # `check-env` walks the source tree, extracts every env-variable reference,
  # and diffs against `expected-env.json`. New `process.env.X` references
  # without a one-line spec entry fail CI, so the "stale env var nobody
  # remembers" failure mode (2026-05-12 sync regression) cannot recur
  # silently. The audit mode that compares against a `vercel env pull`
  # snapshot runs locally — CI has no Vercel credentials. See
  # docs/operations/env-audit.md.
  env-audit:
    name: Env spec
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check env spec
        run: npm run check-env

  # The unit suite is sharded across parallel runners to keep wall-clock low.
  # Each shard collects coverage as a `blob` report (not a final report) and
  # uploads it; the `coverage` job merges all shards and enforces thresholds
  # against the *combined* result. Per-shard threshold checks are disabled
  # here because a single shard only sees a fraction of the code and would
  # always trip the floor — enforcement happens once, on the merge.
  test:
    name: Tests (shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Tests with coverage (shard ${{ matrix.shard }}/3)
        run: >-
          npx vitest run --coverage --reporter=blob
          --shard=${{ matrix.shard }}/3
          --coverage.thresholds.lines=0
          --coverage.thresholds.functions=0
          --coverage.thresholds.statements=0
          --coverage.thresholds.branches=0

      - name: Upload coverage blob
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-blob-${{ matrix.shard }}
          path: .vitest-reports/
          include-hidden-files: true
          retention-days: 1

  # Merge the per-shard coverage blobs and enforce thresholds on the combined
  # result. Floors live in vitest.config.js. Current floor (post-uplift):
  # branches 83 / functions 75 / lines 82 / statements 82. Ratchet target:
  # 90/83/90/90, blocked on UI-component coverage. Do NOT lower these numbers
  # — that is a regression by definition.
  coverage:
    name: Coverage (merge + thresholds enforced)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: test
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Download coverage blobs
        uses: actions/download-artifact@v8
        with:
          pattern: coverage-blob-*
          path: .vitest-reports/
          merge-multiple: true

      - name: Merge reports and enforce coverage thresholds
        run: npx vitest run --merge-reports --coverage

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          retention-days: 14

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  build:
    name: Build (SPA + serverless functions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck, coverage]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build:all

  build-self-host:
    name: Build (self-hosted bundle)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [typecheck, coverage]
    # The default `build` job ships the Vercel-mode bundle (paid tier
    # visible). Self-hosters set VITE_SELF_HOSTED=1 before `npm run
    # build:all`, which flips the tier gates and hides the Subscribe UI
    # (see ADR 014). That code path was previously only exercised by
    # unit tests stubbing `import.meta.env`; this job verifies the real
    # build artifact compiles under the flag, so a self-host-specific
    # regression cannot pass CI silently.
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build self-hosted bundle
        env:
          VITE_SELF_HOSTED: '1'
        run: npm run build:all

      # Boot `npm run serve` (the Hono entrypoint self-hosters use) against
      # the self-hosted bundle and probe the endpoints a fresh deployment
      # touches first. Catches:
      #   - `serve()` from @hono/node-server fails to bind / start
      #   - static handler for `./dist` isn't wired (SPA HTML 404)
      #   - HEAD /api/sync probe used by the Settings gate overlay returns 5xx
      #   - feedback handler doesn't gracefully degrade when env is unset
      # In-process `createApp` tests cover the routing contracts; this step
      # specifically exercises the assembled `startServer` path.
      - name: Boot self-hosted server and smoke endpoints
        env:
          SELF_HOSTED: '1'
          SYNC_STORAGE: memory
          PORT: '3100'
        run: |
          npm run serve >/tmp/fz-serve.log 2>&1 &
          SERVE_PID=$!
          trap "kill $SERVE_PID 2>/dev/null || true" EXIT
          # Wait for the server to bind. Up to ~10s; fail fast if it never
          # answers so the job doesn't sit until timeout.
          for i in {1..20}; do
            if curl -fsS -o /dev/null http://localhost:3100/; then break; fi
            sleep 0.5
          done
          set -e
          # SPA HTML must be served.
          test "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3100/)" = "200"
          # HEAD probe used by the Settings sync gate overlay (ADR 016) must
          # respond < 500 so the overlay distinguishes "server up" from
          # "server unreachable".
          STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X HEAD "http://localhost:3100/api/sync?vaultId=$(printf 'a%.0s' {1..64})")
          test "$STATUS" -lt 500
          # Feedback degrades gracefully when GITHUB_FEEDBACK_TOKEN is unset.
          test "$(curl -s -o /dev/null -w '%{http_code}' -X POST -H 'Content-Type: application/json' -d '{"message":"hi"}' http://localhost:3100/api/feedback)" = "503"
          echo "Self-host runtime smoke passed."

      - name: Dump server log on failure
        if: failure()
        run: tail -100 /tmp/fz-serve.log || true
