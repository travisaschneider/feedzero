name: Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches new advisories against the locked tree.
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codeql:
    name: CodeQL (javascript-typescript)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          # api/*.ts are bundled build artifacts (see scripts/build-api.js);
          # scanning them surfaces false positives against inlined SDKs.
          # The original wrappers in git source + src/core/ are scanned.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:javascript-typescript"

  audit-and-secrets:
    name: npm audit + gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks history scan needs full git history.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # Matches the existing CI gate in ci.yml — production deps only, high+.
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Gitleaks history scan
        uses: gitleaks/gitleaks-action@v2
        env:
          # Open-source invocation — no GITLEAKS_LICENSE for solo repos.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
